# fly.toml app configuration file generated for food-plotter on 2026-07-18T15:55:25-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'food-plotter'
primary_region = 'dfw'

[build]
[env]
  RAILS_LOG_LEVEL = 'info'
  # Container runs as a non-root user (see Dockerfile), which can't bind port
  # 80 — only root can bind privileged ports on Linux. Thruster (bin/thrust)
  # listens on HTTP_PORT and proxies to Puma on TARGET_PORT; Fly's edge still
  # serves the public site on 80/443 and forwards internally to whatever
  # internal_port says below, so this is invisible to visitors.
  HTTP_PORT = '3000'
  TARGET_PORT = '3001'

[[mounts]]
  source = 'food_plotter_storage'
  destination = '/rails/storage'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
